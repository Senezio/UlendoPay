openapi: 3.0.3
info:
  title: 'UlendoPay API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://ulendopay.malawihire.com'
tags:
  -
    name: Endpoints
    description: ''
paths:
  /api/v1/auth/register:
    post:
      summary: 'Step 1 of registration — create account, send phone OTP.'
      operationId: step1OfRegistrationCreateAccountSendPhoneOTP
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                phone:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: ngzmiyvdljnikhwa
                country_code:
                  type: string
                  description: 'Must be 3 characters.'
                  example: ykc
                pin:
                  type: string
                  description: 'Must match the regex /^\d{4}$/. Must be 4 characters.'
                  example: myuw
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: theo.hauck@example.com
                  nullable: true
                password:
                  type: string
                  description: ''
                  example: null
                  nullable: true
              required:
                - name
                - phone
                - country_code
                - pin
      security: []
  /api/v1/auth/verify-phone:
    post:
      summary: 'Step 2 of registration — verify phone with OTP.'
      operationId: step2OfRegistrationVerifyPhoneWithOTP
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
                otp:
                  type: string
                  description: 'Must be 6 characters.'
                  example: ngzmiy
              required:
                - user_id
                - otp
      security: []
  /api/v1/auth/login:
    post:
      summary: 'Step 1 of login — verify credentials, send 2FA OTP.'
      operationId: step1OfLoginVerifyCredentialsSend2FAOTP
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  description: ''
                  example: phone_pin
                  enum:
                    - phone_pin
                    - email_password
                phone:
                  type: string
                  description: 'This field is required when <code>method</code> is <code>phone_pin</code>.'
                  example: architecto
                  nullable: true
                pin:
                  type: string
                  description: 'This field is required when <code>method</code> is <code>phone_pin</code>. Must be 4 characters.'
                  example: ngzm
                  nullable: true
                email:
                  type: string
                  description: 'This field is required when <code>method</code> is <code>email_password</code>. Must be a valid email address.'
                  example: gulgowski.asia@example.com
                  nullable: true
                password:
                  type: string
                  description: 'This field is required when <code>method</code> is <code>email_password</code>.'
                  example: '|]|{+-'
                  nullable: true
              required:
                - method
      security: []
  /api/v1/auth/verify-login:
    post:
      summary: 'Step 2 of login — verify 2FA OTP, issue token.'
      operationId: step2OfLoginVerify2FAOTPIssueToken
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
                otp:
                  type: string
                  description: 'Must be 6 characters.'
                  example: ngzmiy
              required:
                - user_id
                - otp
      security: []
  /api/v1/auth/forgot-pin:
    post:
      summary: ''
      operationId: postApiV1AuthForgotPin
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: bngzmiyvdljnikhw
              required:
