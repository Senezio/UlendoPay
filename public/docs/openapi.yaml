  /api/v1/auth/me:
    get:
      summary: ''
      operationId: getApiV1AuthMe
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Endpoints
      security: []
  /api/v1/kyc/status:
    get:
      summary: 'Get current KYC status and submission history.'
      operationId: getCurrentKYCStatusAndSubmissionHistory
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Endpoints
      security: []
  /api/v1/kyc/submit:
    post:
      summary: 'Submit a KYC document for review.'
      operationId: submitAKYCDocumentForReview
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document_type:
                  type: string
                  description: ''
                  example: national_id
                  enum:
                    - passport
                    - national_id
                    - drivers_license
                    - utility_bill
                document_number:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: b
                  nullable: true
                document:
                  type: string
                  format: binary
                  description: 'Must be a file. Must not be greater than 15360 kilobytes.'
              required:
                - document_type
                - document
      security: []
  '/api/v1/kyc/document/{id}':
    get:
      summary: 'Serve a KYC document securely via signed token.'
      operationId: serveAKYCDocumentSecurelyViaSignedToken
      description: 'Only accessible to the document owner or admins.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
