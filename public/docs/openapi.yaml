      security: []
  /api/v1/auth/reset-password:
    post:
      summary: ''
      operationId: postApiV1AuthResetPassword
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                otp:
                  type: string
                  description: 'Must be 6 characters.'
                  example: miyvdl
                password:
                  type: string
                  description: ''
                  example: architecto
              required:
                - email
                - otp
                - password
      security: []
  /api/v1/topup/webhook:
    post:
      summary: 'Pawapay webhook — receives deposit status updates.'
      operationId: pawapayWebhookReceivesDepositStatusUpdates
      description: "This endpoint is PUBLIC — no auth middleware.\nSecurity is via webhook signature verification."
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
  /api/v1/withdraw/webhook:
