      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: bngzmiyvdljnikhw
                otp:
                  type: string
                  description: 'Must be 6 characters.'
                  example: aykcmy
                pin:
                  type: string
                  description: 'Must match the regex /^\d{4}$/. Must be 4 characters.'
                  example: uwpw
              required:
                - phone
                - otp
                - pin
      security: []
  /api/v1/auth/forgot-password:
    post:
      summary: ''
      operationId: postApiV1AuthForgotPassword
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
